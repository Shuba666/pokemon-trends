<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Pokémon Trends OS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #f1f5f9;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }
    .pokeball {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 4px solid #f1f5f9;
      position: relative;
      animation: wobble 1.5s infinite ease-in-out;
      overflow: hidden;
    }
    .pokeball-top { background: #dc2626; height: 50%; }
    .pokeball-bottom { background: #f1f5f9; height: 50%; }
    .pokeball-center {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #f1f5f9;
      border: 4px solid #0f172a;
      z-index: 1;
    }
    @keyframes wobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-15deg); }
      75% { transform: rotate(15deg); }
    }
    h1 { font-size: 48px; font-weight: 900; color: #dc2626; }
    p { color: #64748b; font-size: 14px; max-width: 300px; line-height: 1.6; }
    a {
      margin-top: 8px;
      background: #dc2626;
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="pokeball">
    <div class="pokeball-top"></div>
    <div class="pokeball-bottom"></div>
    <div class="pokeball-center"></div>
  </div>
  <h1>404</h1>
  <p>This Pokémon escaped! The page you're looking for doesn't exist.</p>
  <a href="/">← Back to Pokémon Trends OS</a>
</body>
</html>
